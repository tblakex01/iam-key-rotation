name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

permissions:
  contents: read
  id-token: write

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            scripts/requirements.txt
            tests/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt -r tests/requirements.txt

      - name: Check formatting
        run: black --check .

      - name: Lint Python
        run: flake8 scripts/ lambda/ tests/ --max-line-length=120 --ignore=E501,W503,E203

      - name: Type check Python
        run: mypy scripts/ lambda/

      - name: Security scan Python
        run: bandit -r scripts/ lambda/

      - name: Run unit and integration tests
        run: pytest

  terraform-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            scripts/requirements.txt
            tests/requirements.txt

      - name: Install Terraform scanners
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Terraform format check
        run: terraform -chdir=terraform/iam fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=terraform/iam init -backend=false -input=false

      - name: Terraform validate
        run: |
          cat > terraform/iam/ci.auto.tfvars.json <<'EOF'
          {
            "name_prefix": "iam-key-rotation",
            "environment_name": "ci",
            "account_id": "123456789012",
            "aws_region": "us-east-1",
            "sender_email": "security@example.com",
            "alarm_sns_topic": "arn:aws:sns:us-east-1:123456789012:iam-key-rotation-alerts",
            "common_tags": {
              "Application": "iam-key-rotation",
              "Environment": "ci"
            },
            "managed_user_info": {},
            "lambda_source_dir": "${{ github.workspace }}/lambda",
            "download_tracker_source_dir": "${{ github.workspace }}/lambda",
            "url_regenerator_source_dir": "${{ github.workspace }}/lambda",
            "cleanup_source_dir": "${{ github.workspace }}/lambda",
            "s3_cleanup_source_dir": "${{ github.workspace }}/lambda"
          }
          EOF
          terraform -chdir=terraform/iam validate -no-color

      - name: TFLint
        run: tflint --chdir=terraform/iam --format compact

      - name: Checkov
        run: checkov -d terraform/iam --quiet

      - name: Configure AWS credentials
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Terraform plan
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        run: terraform -chdir=terraform/iam plan -refresh=false -input=false -lock=false -no-color -out=tfplan
